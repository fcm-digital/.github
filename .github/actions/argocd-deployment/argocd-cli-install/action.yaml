---
name: "ArgoCD CLI Installation"
description: "ArgoCD commands for its CLI installation."

inputs:
  argocd_cli_version:
    required: true
    description: "ArgoCD CLI version."

runs:
  using: "composite"
  steps:
    - id: argocd-cli-install
      name: "ArgoCD CLI Install"
      shell: bash
      run: |
        set -euo pipefail
        
        VERSION="${{ inputs.argocd_cli_version }}"
        BINARY="argocd-linux-amd64"
        DOWNLOAD_URL="https://github.com/argoproj/argo-cd/releases/download/${VERSION}/${BINARY}"
        CHECKSUM_URL="${DOWNLOAD_URL}.sha256"
        
        echo "Downloading ArgoCD CLI ${VERSION}..."
        curl -sSL -o "${BINARY}" "${DOWNLOAD_URL}"
        
        echo "Downloading checksum..."
        curl -sSL -o "${BINARY}.sha256" "${CHECKSUM_URL}"
        
        echo "Verifying checksum..."
        sha256sum -c "${BINARY}.sha256"
        
        echo "Installing ArgoCD CLI..."
        sudo install -m 555 "${BINARY}" /usr/local/bin/argocd
        
        echo "Cleaning up..."
        rm -f "${BINARY}" "${BINARY}.sha256"
        
        echo "ArgoCD CLI installed successfully"

    - id: argocd-cli-version
      name: "ArgoCD CLI Version"
      shell: bash
      run: |
        argocd version --short
