name: "Detect Kubernetes Manifests"
description: "Detects if repository has Kubernetes manifests and their type"

inputs:
  search_paths:
    description: "Comma-separated paths to search for manifests"
    required: false
    default: "kube,k8s,kubernetes,deploy,manifests"

outputs:
  has_manifests:
    description: "Whether Kubernetes manifests were found"
    value: ${{ steps.detect.outputs.has_manifests }}
  manifests_path:
    description: "Path to the manifests directory"
    value: ${{ steps.detect.outputs.manifests_path }}
  uses_kustomize:
    description: "Whether the manifests use Kustomize"
    value: ${{ steps.detect.outputs.uses_kustomize }}
  uses_helm:
    description: "Whether the manifests use Helm"
    value: ${{ steps.detect.outputs.uses_helm }}

runs:
  using: "composite"
  steps:
    - name: Detect Kubernetes manifests
      id: detect
      shell: bash
      run: |
        SEARCH_PATHS="${{ inputs.search_paths }}"

        HAS_MANIFESTS="false"
        MANIFESTS_PATH=""
        USES_KUSTOMIZE="false"
        USES_HELM="false"

        # Search in common paths
        IFS=',' read -ra PATHS <<< "$SEARCH_PATHS"
        for path in "${PATHS[@]}"; do
          path=$(echo "$path" | xargs)  # trim whitespace
          if [ -d "$path" ]; then
            HAS_MANIFESTS="true"
            MANIFESTS_PATH="$path"

            # Check for Kustomize
            if [ -f "${path}/kustomization.yaml" ] || [ -f "${path}/kustomization.yml" ]; then
              USES_KUSTOMIZE="true"
            fi

            # Check for Helm
            if [ -f "${path}/Chart.yaml" ] || [ -f "${path}/Chart.yml" ]; then
              USES_HELM="true"
            fi

            break
          fi
        done

        echo "has_manifests=$HAS_MANIFESTS" >> $GITHUB_OUTPUT
        echo "manifests_path=$MANIFESTS_PATH" >> $GITHUB_OUTPUT
        echo "uses_kustomize=$USES_KUSTOMIZE" >> $GITHUB_OUTPUT
        echo "uses_helm=$USES_HELM" >> $GITHUB_OUTPUT

        if [ "$HAS_MANIFESTS" = "true" ]; then
          echo "::notice::Found manifests at: $MANIFESTS_PATH (Kustomize: $USES_KUSTOMIZE, Helm: $USES_HELM)"
        else
          echo "::notice::No Kubernetes manifests found"
        fi
